<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugLens — AI Screenshot Debugger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --border-bright: #3d3d50;
    --accent: #7c6dfa;
    --accent2: #a78bfa;
    --accent-glow: rgba(124, 109, 250, 0.15);
    --text: #e8e8f0;
    --text-muted: #7a7a92;
    --text-faint: #4a4a60;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.02em;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .badge {
    font-size: 0.65rem;
    font-family: var(--mono);
    background: var(--accent-glow);
    color: var(--accent2);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-height: calc(100vh - 65px);
  }

  .panel {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    overflow-y: auto;
  }

  .panel-left { border-right: 1px solid var(--border); }

  .panel-title {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--text-faint); }

  .btn-icon {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 38px;
    height: 38px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 1rem;
  }
  .btn-icon:hover { border-color: var(--border-bright); color: var(--text); }

  .upload-zone {
    border: 1.5px dashed var(--border-bright);
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
    flex-shrink: 0;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 2rem;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  .upload-text {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .upload-text strong { color: var(--accent2); }

  .preview-wrap {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }

  .preview-wrap img {
    width: 100%;
    display: block;
    max-height: 320px;
    object-fit: contain;
    background: #111;
  }

  .preview-clear {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border-bright);
    color: var(--text);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .context-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.875rem;
    padding: 12px 14px;
    border-radius: 8px;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .context-input:focus { border-color: var(--accent); }
  .context-input::placeholder { color: var(--text-faint); }

  .analyze-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .analyze-btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 1rem;
    color: var(--text-faint);
    padding: 3rem;
  }

  .empty-icon { font-size: 2.5rem; opacity: 0.3; }
  .empty-state p { font-size: 0.875rem; line-height: 1.6; max-width: 280px; }

  .result-block {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .result-card-header {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .result-card-header .label {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-red { background: var(--red); }
  .dot-amber { background: var(--amber); }
  .dot-green { background: var(--green); }
  .dot-purple { background: var(--accent2); }

  .result-card-body {
    padding: 1rem 1.25rem;
    font-size: 0.875rem;
    line-height: 1.75;
    color: var(--text);
  }

  .result-card-body code {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--accent2);
  }

  .result-card-body pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
    margin: 0.75rem 0;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.6;
  }

  .severity-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .sev-high { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
  .sev-medium { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
  .sev-low { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }

  .streaming-cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent2);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .error-toast {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    display: none;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; max-height: none; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Bug<span>Lens</span></div>
  <div class="badge">Powered by Gemma 4</div>
</header>

<main>
  <!-- LEFT PANEL: Input -->
  <div class="panel panel-left">
    <div class="panel-title">Configuration</div>

    <div>
      <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">Google AI Studio API Key</div>
      <div class="api-row">
        <input type="password" class="api-input" id="apiKey" placeholder="AIza...">
        <button class="btn-icon" id="toggleKey" title="Toggle visibility">👁</button>
      </div>
    </div>

    <div class="panel-title" style="margin-top:0.5rem">Upload Screenshot</div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">📸</div>
      <div class="upload-text">
        <strong>Click to upload</strong> or drag & drop<br>
        PNG, JPG, WEBP — any error screenshot
      </div>
    </div>

    <div class="preview-wrap" id="previewWrap" style="display:none">
      <img id="preview" src="" alt="Screenshot preview">
      <button class="preview-clear" id="clearImg" title="Remove">✕</button>
    </div>

    <div>
      <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">Additional context <span style="color:var(--text-faint)">(optional)</span></div>
      <textarea class="context-input" id="context" rows="3" placeholder="e.g. React app, Node 18, this error happens when user logs in..."></textarea>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <button class="analyze-btn" id="analyzeBtn" disabled>
      <div class="spinner" id="spinner"></div>
      <span id="btnText">🔍 Analyze Bug</span>
    </button>
  </div>

  <!-- RIGHT PANEL: Output -->
  <div class="panel" id="outputPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔬</div>
      <p>Upload a screenshot of a bug, error, or broken UI and BugLens will diagnose what's wrong and how to fix it.</p>
    </div>

    <div class="result-block" id="resultBlock" style="display:none"></div>
  </div>
</main>

<script>
  const apiKeyInput = document.getElementById('apiKey');
  const toggleKey = document.getElementById('toggleKey');
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const previewWrap = document.getElementById('previewWrap');
  const preview = document.getElementById('preview');
  const clearImg = document.getElementById('clearImg');
  const contextInput = document.getElementById('context');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorToast = document.getElementById('errorToast');
  const emptyState = document.getElementById('emptyState');
  const resultBlock = document.getElementById('resultBlock');

  let imageBase64 = null;
  let imageMimeType = null;

  toggleKey.addEventListener('click', () => {
    apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
  });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
  });

  function loadImage(file) {
    imageMimeType = file.type || 'image/png';
    const reader = new FileReader();
    reader.onload = (e) => {
      const result = e.target.result;
      imageBase64 = result.split(',')[1];
      preview.src = result;
      uploadZone.style.display = 'none';
      previewWrap.style.display = 'block';
      updateBtn();
    };
    reader.readAsDataURL(file);
  }

  clearImg.addEventListener('click', () => {
    imageBase64 = null;
    imageMimeType = null;
    fileInput.value = '';
    preview.src = '';
    previewWrap.style.display = 'none';
    uploadZone.style.display = 'block';
    updateBtn();
  });

  function updateBtn() {
    analyzeBtn.disabled = !(imageBase64 && apiKeyInput.value.trim());
  }

  apiKeyInput.addEventListener('input', updateBtn);

  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.style.display = 'block';
    setTimeout(() => errorToast.style.display = 'none', 5000);
  }

  analyzeBtn.addEventListener('click', analyze);

  async function analyze() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey || !imageBase64) return;

    analyzeBtn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Analyzing...';
    errorToast.style.display = 'none';
    emptyState.style.display = 'none';
    resultBlock.style.display = 'flex';

    resultBlock.innerHTML = `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot dot-purple"></div>
          <div class="label" style="color:var(--accent2)">Gemma 4 is analyzing your screenshot...</div>
        </div>
        <div class="result-card-body" style="color:var(--text-muted); font-style:italic;">
          Reading the image and diagnosing the issue<span class="streaming-cursor"></span>
        </div>
      </div>
    `;

    const context = contextInput.value.trim();
    const prompt = `You are an expert software debugger. Analyze this screenshot carefully.

${context ? `Additional context from developer: ${context}\n\n` : ''}

Please provide a structured analysis with these exact sections:

**ERROR TYPE**: [one-line description of what kind of error/bug this is]
**SEVERITY**: [High / Medium / Low]
**ROOT CAUSE**: [Clear explanation of why this error is happening]
**AFFECTED AREA**: [What part of the code/system is affected]
**FIX**: [Step-by-step solution with code examples if applicable]
**PREVENTION**: [How to prevent this in the future]

Be specific and technical. If you see actual error messages or code in the screenshot, reference them directly.`;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: prompt },
                { inline_data: { mime_type: imageMimeType, data: imageBase64 } }
              ]
            }],
            generationConfig: { temperature: 0.2, maxOutputTokens: 2048 }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

      if (!text) throw new Error('No response from Gemma. Check your API key and try again.');

      renderResult(text);

    } catch (err) {
      resultBlock.innerHTML = '';
      resultBlock.style.display = 'none';
      emptyState.style.display = 'flex';
      showError('Error: ' + err.message);
    } finally {
      analyzeBtn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '🔍 Analyze Bug';
      updateBtn();
    }
  }

  function parseSection(text, key) {
    const regex = new RegExp(`\\*\\*${key}\\*\\*[:\\s]*([\\s\\S]*?)(?=\\*\\*[A-Z ]+\\*\\*|$)`, 'i');
    const match = text.match(regex);
    return match ? match[1].trim() : null;
  }

  function formatBody(text) {
    return text
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
      .replace(/\n/g, '<br>');
  }

  function renderResult(text) {
    const errorType = parseSection(text, 'ERROR TYPE');
    const severity = parseSection(text, 'SEVERITY');
    const rootCause = parseSection(text, 'ROOT CAUSE');
    const affected = parseSection(text, 'AFFECTED AREA');
    const fix = parseSection(text, 'FIX');
    const prevention = parseSection(text, 'PREVENTION');

    const sevClass = severity?.toLowerCase().includes('high') ? 'sev-high'
      : severity?.toLowerCase().includes('medium') ? 'sev-medium' : 'sev-low';

    const dotClass = severity?.toLowerCase().includes('high') ? 'dot-red'
      : severity?.toLowerCase().includes('medium') ? 'dot-amber' : 'dot-green';

    resultBlock.innerHTML = `
      ${errorType ? `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot ${dotClass}"></div>
          <div class="label" style="color:var(--text-muted)">Diagnosis</div>
          ${severity ? `<span class="severity-pill ${sevClass}" style="margin-left:auto">${severity.replace(/\*/g,'').trim().toUpperCase()}</span>` : ''}
        </div>
        <div class="result-card-body" style="font-size:1rem; font-weight:500">${formatBody(errorType)}</div>
      </div>` : ''}

      ${rootCause ? `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot dot-amber"></div>
          <div class="label" style="color:var(--amber)">Root Cause</div>
        </div>
        <div class="result-card-body">${formatBody(rootCause)}</div>
      </div>` : ''}

      ${affected ? `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot dot-red"></div>
          <div class="label" style="color:var(--red)">Affected Area</div>
        </div>
        <div class="result-card-body">${formatBody(affected)}</div>
      </div>` : ''}

      ${fix ? `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot dot-green"></div>
          <div class="label" style="color:var(--green)">How to Fix</div>
        </div>
        <div class="result-card-body">${formatBody(fix)}</div>
      </div>` : ''}

      ${prevention ? `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot dot-purple"></div>
          <div class="label" style="color:var(--accent2)">Prevention</div>
        </div>
        <div class="result-card-body">${formatBody(prevention)}</div>
      </div>` : `
      <div class="result-card">
        <div class="result-card-header">
          <div class="dot dot-purple"></div>
          <div class="label" style="color:var(--accent2)">Full Analysis</div>
        </div>
        <div class="result-card-body">${formatBody(text)}</div>
      </div>`}
    `;
  }
</script>
</body>
</html>
